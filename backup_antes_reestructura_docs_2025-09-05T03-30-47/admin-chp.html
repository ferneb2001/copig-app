<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión CHP - COPIG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .btn-back {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: linear-gradient(135deg, #2980b9, #1f4e79);
            transform: translateY(-2px);
        }

        /* Layout Principal */
        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            min-height: 600px;
        }

        /* Lista de Solicitudes */
        .solicitudes-list {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-height: 800px;
            overflow-y: auto;
        }

        .solicitudes-list h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .solicitud-item {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .solicitud-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        .solicitud-item.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea10, #764ba210);
        }

        .solicitud-numero {
            font-weight: 700;
            color: #2c3e50;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .solicitud-comitente {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .solicitud-estado {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .estado-pendiente {
            background: #fff3cd;
            color: #856404;
        }

        .estado-aprobado {
            background: #d1ecf1;
            color: #0c5460;
        }

        .estado-esperando-pago {
            background: #f8d7da;
            color: #721c24;
        }

        .estado-emitido {
            background: #d4edda;
            color: #155724;
        }

        /* Panel de Gestión */
        .gestion-panel {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            overflow-y: auto;
            max-height: 800px;
        }

        .no-selection {
            text-align: center;
            color: #7f8c8d;
            padding: 60px 20px;
        }

        .no-selection h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        /* Tres Secciones Principales */
        .seccion {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .seccion-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 18px 25px;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .seccion-contenido {
            padding: 25px;
        }

        /* Sección 1: Datos de la Encomienda */
        .datos-encomienda {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .campo-datos {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
        }

        .campo-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
        }

        .campo-valor {
            color: #2c3e50;
            font-size: 1rem;
            line-height: 1.4;
        }

        .descripcion-editable {
            grid-column: span 2;
        }

        .descripcion-editable textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        .descripcion-editable textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-guardar-descripcion {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn-guardar-descripcion:hover {
            background: linear-gradient(135deg, #20c997, #17a2b8);
            transform: translateY(-1px);
        }

        /* Sección 2: Documentación */
        .documentos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .documento-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .documento-item:hover {
            border-color: #dc3545;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.2);
        }

        .documento-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #dc3545;
        }

        .documento-nombre {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .documento-estado {
            font-size: 0.85rem;
            color: #28a745;
        }

        /* Sección 3: Arancel y Factura */
        .arancel-section {
            background: linear-gradient(135deg, #ffeaa7, #fab1a0);
            border-radius: 12px;
            padding: 25px;
            border: 2px solid #fdcb6e;
        }

        .arancel-form {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
            gap: 20px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group input {
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e17055;
            box-shadow: 0 0 0 3px rgba(225, 112, 85, 0.1);
        }

        .btn-generar-factura {
            background: linear-gradient(135deg, #e17055, #d63031);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-generar-factura:hover {
            background: linear-gradient(135deg, #d63031, #b71c1c);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(214, 48, 49, 0.3);
        }

        .btn-generar-factura:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Estados de solicitud */
        .info-estado {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .info-estado h4 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .datos-encomienda {
                grid-template-columns: 1fr;
            }

            .arancel-form {
                grid-template-columns: 1fr;
            }
        }

        /* Loading y mensajes */
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏛️ Gestión de Certificados de Habilitación Profesional</h1>
            <a href="/admin" class="btn-back">
                ← Volver al Panel Principal
            </a>
        </div>

        <div class="main-content">
            <!-- Lista de Solicitudes -->
            <div class="solicitudes-list">
                <h2>📋 Solicitudes CHP</h2>
                <div id="listaSolicitudes" class="loading">
                    Cargando solicitudes...
                </div>
            </div>

            <!-- Panel de Gestión -->
            <div class="gestion-panel" id="gestionPanel">
                <div class="no-selection">
                    <h3>👆 Selecciona una solicitud</h3>
                    <p>Elige una solicitud de la lista para comenzar a gestionarla</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variables globales
        let solicitudesData = [];
        let solicitudSeleccionada = null;

        // Cargar solicitudes al inicio
        document.addEventListener('DOMContentLoaded', function() {
            cargarSolicitudes();
        });

        // Función para cargar solicitudes
        async function cargarSolicitudes() {
            try {
                const response = await fetch('/api/admin/solicitudes-chp');
                const data = await response.json();
                
                if (data.success) {
                    solicitudesData = data.solicitudes || [];
                    renderizarListaSolicitudes();
                } else {
                    console.error('Error al cargar solicitudes:', data.message);
                    document.getElementById('listaSolicitudes').innerHTML = 
                        '<div class="alert alert-error">Error al cargar solicitudes</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('listaSolicitudes').innerHTML = 
                    '<div class="alert alert-error">Error de conexión</div>';
            }
        }

        // Renderizar lista de solicitudes
        function renderizarListaSolicitudes() {
            const container = document.getElementById('listaSolicitudes');
            
            if (solicitudesData.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No hay solicitudes CHP</div>';
                return;
            }

            let html = '';
            solicitudesData.forEach(solicitud => {
                const estadoClass = `estado-${(solicitud.estado || 'pendiente').toLowerCase().replace(/_/g, '-')}`;
                html += `
                    <div class="solicitud-item" onclick="seleccionarSolicitud(${solicitud.id})" data-id="${solicitud.id}">
                        <div class="solicitud-numero">${solicitud.numero_solicitud}</div>
                        <div class="solicitud-comitente">${solicitud.comitente || 'Sin comitente'}</div>
                        <div class="solicitud-estado ${estadoClass}">
                            ${formatearEstado(solicitud.estado)}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Seleccionar solicitud
        function seleccionarSolicitud(id) {
            solicitudSeleccionada = solicitudesData.find(s => s.id === id);
            
            // Actualizar UI
            document.querySelectorAll('.solicitud-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-id="${id}"]`).classList.add('active');
            
            // Renderizar panel de gestión
            renderizarPanelGestion();
        }

        // Renderizar panel de gestión con las 3 secciones
        function renderizarPanelGestion() {
            if (!solicitudSeleccionada) return;

            const panel = document.getElementById('gestionPanel');
            const solicitud = solicitudSeleccionada;
            
            panel.innerHTML = `
                <div class="info-estado">
                    <h4>📄 ${solicitud.numero_solicitud}</h4>
                    <p>Estado actual: ${formatearEstado(solicitud.estado)}</p>
                </div>

                <!-- SECCIÓN 1: REVISAR Y CORREGIR DATOS DE LA ENCOMIENDA -->
                <div class="seccion">
                    <div class="seccion-header">
                        <span>📝</span>
                        <span>Sección 1: Revisar y Corregir Datos de la Encomienda</span>
                    </div>
                    <div class="seccion-contenido">
                        <div class="datos-encomienda">
                            <div class="campo-datos">
                                <span class="campo-label">Comitente:</span>
                                <div class="campo-valor">${solicitud.comitente || 'No especificado'}</div>
                            </div>
                            <div class="campo-datos">
                                <span class="campo-label">Proyecto:</span>
                                <div class="campo-valor">${solicitud.proyecto || 'No especificado'}</div>
                            </div>
                            <div class="campo-datos">
                                <span class="campo-label">Ubicación de la Obra:</span>
                                <div class="campo-valor">${solicitud.ubicacion_obra || 'No especificada'}</div>
                            </div>
                            <div class="campo-datos">
                                <span class="campo-label">Fecha de Solicitud:</span>
                                <div class="campo-valor">${formatearFecha(solicitud.fecha_solicitud)}</div>
                            </div>
                            <div class="descripcion-editable">
                                <span class="campo-label">Descripción de la Tarea Profesional (Editable):</span>
                                <textarea id="descripcionTarea" placeholder="Ingrese la descripción corregida de la tarea profesional según los protocolos del Consejo...">${solicitud.descripcion || ''}</textarea>
                                <button class="btn-guardar-descripcion" onclick="guardarDescripcion()">
                                    💾 Guardar Corrección
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 2: VERIFICAR DOCUMENTACIÓN ADJUNTA -->
                <div class="seccion">
                    <div class="seccion-header">
                        <span>📎</span>
                        <span>Sección 2: Verificar Documentación Adjunta</span>
                    </div>
                    <div class="seccion-contenido">
                        <div class="documentos-grid">
                            <div class="documento-item" onclick="verDocumento('rotulo')">
                                <div class="documento-icon">📐</div>
                                <div class="documento-nombre">Rótulo</div>
                                <div class="documento-estado">Pendiente revisión</div>
                            </div>
                            <div class="documento-item" onclick="verDocumento('comprobante_caja')">
                                <div class="documento-icon">🏦</div>
                                <div class="documento-nombre">Comprobante Caja</div>
                                <div class="documento-estado">Pendiente revisión</div>
                            </div>
                            <div class="documento-item" onclick="verDocumento('pago_matricula')">
                                <div class="documento-icon">💳</div>
                                <div class="documento-nombre">Pago Matrícula</div>
                                <div class="documento-estado">Pendiente revisión</div>
                            </div>
                            <div class="documento-item" onclick="verDocumento('plano_ubicacion')">
                                <div class="documento-icon">🗺️</div>
                                <div class="documento-nombre">Plano Ubicación</div>
                                <div class="documento-estado">Pendiente revisión</div>
                            </div>
                            <div class="documento-item" onclick="verDocumento('memoria_tecnica')">
                                <div class="documento-icon">📄</div>
                                <div class="documento-nombre">Memoria Técnica</div>
                                <div class="documento-estado">Pendiente revisión</div>
                            </div>
                            <div class="documento-item" onclick="verDocumento('otros')">
                                <div class="documento-icon">📁</div>
                                <div class="documento-nombre">Otros Documentos</div>
                                <div class="documento-estado">Pendiente revisión</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 3: ESTABLECER ARANCEL Y GENERAR FACTURA -->
                <div class="seccion">
                    <div class="seccion-header">
                        <span>💰</span>
                        <span>Sección 3: Establecer Arancel y Generar Factura</span>
                    </div>
                    <div class="seccion-contenido">
                        <div class="arancel-section">
                            <div class="arancel-form">
                                <div class="form-group">
                                    <label for="montoArancel">Importe a Facturar</label>
                                    <input type="number" id="montoArancel" step="0.01" min="0" 
                                           placeholder="0.00" value="${solicitud.arancel_establecido || ''}">
                                </div>
                                <div class="form-group">
                                    <label for="moneda">Moneda</label>
                                    <input type="text" id="moneda" value="ARS" readonly>
                                </div>
                                <div class="form-group">
                                    <button class="btn-generar-factura" onclick="generarFacturaYNotificar()" 
                                            ${(solicitud.estado === 'ESPERANDO_PAGO' || solicitud.estado === 'PAGADO' || solicitud.estado === 'EMITIDO') ? 'disabled' : ''}>
                                        <span>🧾</span>
                                        <span>Generar Factura y Notificar</span>
                                    </button>
                                </div>
                            </div>
                            <div style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.7); border-radius: 8px;">
                                <p><strong>⚠️ Importante:</strong> Al generar la factura:</p>
                                <ul style="margin: 10px 0 0 20px;">
                                    <li>Se enviará automáticamente al profesional</li>
                                    <li>La solicitud cambiará a estado "ESPERANDO_PAGO"</li>
                                    <li>El profesional podrá subir su comprobante de pago</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Funciones de acciones
        async function guardarDescripcion() {
            if (!solicitudSeleccionada) return;

            const descripcion = document.getElementById('descripcionTarea').value;
            
            try {
                const response = await fetch(`/api/admin/solicitud-chp/${solicitudSeleccionada.id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        descripcion: descripcion,
                        accion: 'corregir_descripcion'
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    // Actualizar datos locales
                    solicitudSeleccionada.descripcion = descripcion;
                    
                    // Mostrar confirmación
                    mostrarNotificacion('✅ Descripción guardada correctamente', 'success');
                } else {
                    mostrarNotificacion('❌ Error al guardar la descripción', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarNotificacion('❌ Error de conexión', 'error');
            }
        }

        function verDocumento(tipo) {
            // Simulación de visualización de documento
            alert(`📄 Visualizar documento: ${tipo.replace(/_/g, ' ').toUpperCase()}\n\n⚠️ Funcionalidad en desarrollo\nSe abrirá el visor de PDFs`);
        }

        async function generarFacturaYNotificar() {
            if (!solicitudSeleccionada) return;

            const monto = parseFloat(document.getElementById('montoArancel').value);
            
            if (!monto || monto <= 0) {
                mostrarNotificacion('⚠️ Debe ingresar un monto válido', 'error');
                return;
            }

            if (!confirm(`¿Confirmar generación de factura por $${monto.toFixed(2)}?\n\nEsto enviará la factura al profesional y cambiará el estado a ESPERANDO_PAGO.`)) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/solicitud-chp/${solicitudSeleccionada.id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        estado: 'ESPERANDO_PAGO',
                        arancel_establecido: monto,
                        accion: 'generar_factura'
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    // Actualizar datos locales
                    solicitudSeleccionada.estado = 'ESPERANDO_PAGO';
                    solicitudSeleccionada.arancel_establecido = monto;
                    
                    // Recargar vistas
                    renderizarListaSolicitudes();
                    renderizarPanelGestion();
                    
                    mostrarNotificacion('🎉 Factura generada y enviada al profesional', 'success');
                } else {
                    mostrarNotificacion('❌ Error al generar la factura', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarNotificacion('❌ Error de conexión', 'error');
            }
        }

        // Funciones de utilidad
        function formatearEstado(estado) {
            const estados = {
                'PENDIENTE': 'Pendiente',
                'APROBADO': 'Aprobado',
                'ESPERANDO_PAGO': 'Esperando Pago',
                'PAGADO': 'Pagado',
                'EMITIDO': 'Emitido',
                'RECHAZADO': 'Rechazado'
            };
            return estados[estado] || estado;
        }

        function formatearFecha(fecha) {
            if (!fecha) return 'No especificada';
            return new Date(fecha).toLocaleDateString('es-AR');
        }

        function mostrarNotificacion(mensaje, tipo) {
            // Crear elemento de notificación
            const notif = document.createElement('div');
            notif.className = `alert alert-${tipo}`;
            notif.textContent = mensaje;
            notif.style.position = 'fixed';
            notif.style.top = '20px';
            notif.style.right = '20px';
            notif.style.zIndex = '10000';
            notif.style.minWidth = '300px';
            
            document.body.appendChild(notif);
            
            // Remover después de 3 segundos
            setTimeout(() => {
                document.body.removeChild(notif);
            }, 3000);
        }
    </script>
</body>
</html>
