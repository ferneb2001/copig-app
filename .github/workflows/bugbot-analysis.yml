name: 🤖 Bugbot Analysis - Detección automática de errores

on:
  push:
    branches: [ main, test-bugbot, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Permite ejecución manual

jobs:
  analyze-code:
    runs-on: ubuntu-latest
    name: 🔍 Análisis automático de código
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Obtiene historial completo
        
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: |
        npm ci --ignore-scripts || npm install --ignore-scripts || echo "No package.json found"
        
    - name: 🔍 ESLint Analysis
      run: |
        echo "🤖 BUGBOT: Analizando código JavaScript..."
        # Instalar ESLint si no existe
        npm install --no-save eslint @eslint/js || true
        
        # Crear configuración ESLint temporal
        cat > .eslintrc.js << 'EOF'
        module.exports = {
          env: { node: true, es2021: true },
          extends: ['eslint:recommended'],
          parserOptions: { ecmaVersion: 12, sourceType: 'module' },
          rules: {
            'no-undef': 'error',
            'no-unused-vars': 'warn', 
            'eqeqeq': 'error',
            'no-eval': 'error',
            'no-implied-eval': 'error',
            'no-loop-func': 'error',
            'no-unreachable': 'error',
            'prefer-const': 'warn',
            'no-var': 'warn'
          }
        };
        EOF
        
        # Ejecutar análisis
        echo "## 🐛 ERRORES DETECTADOS POR BUGBOT" >> analysis-result.md
        npx eslint "**/*.js" --ignore-pattern node_modules --ignore-pattern backup_* --format unix > eslint-results.txt 2>&1 || true
        
        if [ -s eslint-results.txt ]; then
          echo "❌ **ERRORES ENCONTRADOS:**" >> analysis-result.md
          echo '```' >> analysis-result.md
          cat eslint-results.txt >> analysis-result.md
          echo '```' >> analysis-result.md
        else
          echo "✅ **NO SE ENCONTRARON ERRORES DE SINTAXIS**" >> analysis-result.md
        fi
        
    - name: 🔍 Security Analysis
      run: |
        echo "🛡️ BUGBOT: Análisis de seguridad..."
        echo "" >> analysis-result.md
        echo "## 🛡️ ANÁLISIS DE SEGURIDAD" >> analysis-result.md
        
        # Buscar patrones peligrosos
        echo "### ⚠️ Patrones peligrosos detectados:" >> analysis-result.md
        
        # SQL Injection
        if grep -rn "SELECT.*+\|INSERT.*+\|UPDATE.*+" --include="*.js" --exclude-dir=node_modules --exclude-dir=backup_* . || true; then
          echo "- 🚨 **SQL Injection**: Concatenación de strings en queries SQL" >> analysis-result.md
        fi
        
        # eval() usage
        if grep -rn "eval(" --include="*.js" --exclude-dir=node_modules --exclude-dir=backup_* . || true; then
          echo "- 🚨 **Uso de eval()**: Ejecución de código dinámico peligroso" >> analysis-result.md
        fi
        
        # Console.log en producción
        if grep -rn "console\.log" --include="*.js" --exclude-dir=node_modules --exclude-dir=backup_* . || true; then
          echo "- ⚠️ **Console.log**: Logs que podrían exponer información sensible" >> analysis-result.md
        fi
        
    - name: 🔍 Code Quality Analysis
      run: |
        echo "📊 BUGBOT: Análisis de calidad..."
        echo "" >> analysis-result.md
        echo "## 📊 CALIDAD DE CÓDIGO" >> analysis-result.md
        
        # Buscar problemas comunes
        echo "### 🔍 Problemas detectados:" >> analysis-result.md
        
        # Variables no declaradas (aproximación)
        if grep -rn "^\s*[a-zA-Z_][a-zA-Z0-9_]*\s*=" --include="*.js" --exclude-dir=node_modules --exclude-dir=backup_* . | grep -v "const\|let\|var" | head -5; then
          echo "- ⚠️ **Posibles variables sin declarar**" >> analysis-result.md
        fi
        
        # Comparaciones débiles
        if grep -rn "==\|!=" --include="*.js" --exclude-dir=node_modules --exclude-dir=backup_* . | head -5; then
          echo "- ⚠️ **Comparaciones débiles (== en lugar de ===)**" >> analysis-result.md
        fi
        
        # Async sin await
        if grep -rn "async.*function" --include="*.js" --exclude-dir=node_modules --exclude-dir=backup_* . | head -3; then
          echo "- 💡 **Funciones async detectadas - verificar uso de await**" >> analysis-result.md
        fi
        
    - name: 📝 Crear comentario con resultados
      run: |
        echo "🤖 BUGBOT: Generando reporte..."
        
        if [ -f analysis-result.md ]; then
          echo "## 🤖 REPORTE AUTOMÁTICO DE BUGBOT" > final-report.md
          echo "" >> final-report.md
          echo "**Fecha:** $(date)" >> final-report.md
          echo "**Commit:** ${{ github.sha }}" >> final-report.md
          echo "**Branch:** ${{ github.ref_name }}" >> final-report.md
          echo "" >> final-report.md
          cat analysis-result.md >> final-report.md
          echo "" >> final-report.md
          echo "---" >> final-report.md
          echo "*🤖 Análisis automático generado por Bugbot para @${{ github.actor }}*" >> final-report.md
          
          echo "📄 REPORTE GENERADO:"
          cat final-report.md
        fi
        
    - name: 📤 Upload results
      uses: actions/upload-artifact@v4
      with:
        name: bugbot-analysis-report
        path: |
          final-report.md
          eslint-results.txt
        retention-days: 30
        
    - name: 💬 Comment on PR (if applicable)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          try {
            const report = fs.readFileSync('final-report.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
          } catch (error) {
            console.log('No se pudo crear comentario:', error.message);
          }