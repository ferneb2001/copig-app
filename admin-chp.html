<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión CHP - COPIG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .btn-back {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: linear-gradient(135deg, #2980b9, #1f4e79);
            transform: translateY(-2px);
        }

        /* Layout Principal */
        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            min-height: 600px;
        }

        /* Lista de Solicitudes */
        .solicitudes-list {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-height: 800px;
            overflow-y: auto;
        }

        .solicitudes-list h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .solicitud-item {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .solicitud-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        .solicitud-item.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea10, #764ba210);
        }

        .solicitud-numero {
            font-weight: 700;
            color: #2c3e50;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .solicitud-comitente {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .solicitud-estado {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .estado-pendiente {
            background: #fff3cd;
            color: #856404;
        }

        .estado-aprobado {
            background: #d1ecf1;
            color: #0c5460;
        }

        .estado-esperando-pago {
            background: #f8d7da;
            color: #721c24;
        }

        .estado-emitido {
            background: #d4edda;
            color: #155724;
        }

        /* Panel de Gestión */
        .gestion-panel {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            overflow-y: auto;
            max-height: 800px;
        }

        .no-selection {
            text-align: center;
            color: #7f8c8d;
            padding: 60px 20px;
        }

        .no-selection h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        /* Tres Secciones Principales */
        .seccion {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .seccion-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 18px 25px;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .seccion-contenido {
            padding: 25px;
        }

        /* Sección 1: Datos de la Encomienda */
        .datos-encomienda {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .campo-datos {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
        }

        .campo-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
        }

        .campo-valor {
            color: #2c3e50;
            font-size: 1rem;
            line-height: 1.4;
        }

        .descripcion-editable {
            grid-column: span 2;
        }

        .descripcion-editable textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        .descripcion-editable textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-guardar-descripcion {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn-guardar-descripcion:hover {
            background: linear-gradient(135deg, #20c997, #17a2b8);
            transform: translateY(-1px);
        }

        /* Sección 2 NUEVA: Sistema de Pestañas para Documentos */
        .documentos-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        /* Campo combinado Caja y Matrícula */
        .campo-combinado {
            background: linear-gradient(135deg, #e8f5e8, #f0f8ff);
            border: 2px solid #28a745;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .campo-combinado h4 {
            color: #155724;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-zone {
            border: 2px dashed #28a745;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background: white;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-zone:hover {
            border-color: #20c997;
            background: #f8fff8;
        }

        .upload-zone.dragover {
            border-color: #17a2b8;
            background: #e6f9ff;
        }

        .file-input {
            display: none;
        }

        .upload-text {
            color: #495057;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 0.85rem;
            color: #6c757d;
        }

        /* Pestañas para otros documentos */
        .tabs-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #dee2e6;
        }

        .tabs-nav {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            overflow-x: auto;
        }

        .tab-button {
            padding: 15px 20px;
            border: none;
            background: transparent;
            color: #495057;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-button:hover {
            background: #e9ecef;
            color: #2c3e50;
        }

        .tab-button.active {
            background: white;
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            padding: 25px;
            min-height: 200px;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* Zona de subida múltiple por pestaña */
        .multiple-upload-zone {
            border: 2px dashed #dc3545;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            background: #fff5f5;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .multiple-upload-zone:hover {
            border-color: #c82333;
            background: #ffe6e6;
        }

        .multiple-upload-zone.dragover {
            border-color: #28a745;
            background: #e6ffe6;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #dc3545;
        }

        .upload-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .upload-description {
            color: #6c757d;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .upload-button {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-button:hover {
            background: linear-gradient(135deg, #c82333, #bd2130);
            transform: translateY(-1px);
        }

        /* Lista de archivos subidos */
        .files-list {
            margin-top: 20px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-icon {
            color: #dc3545;
            font-size: 1.2rem;
        }

        .file-name {
            font-weight: 600;
            color: #2c3e50;
        }

        .file-size {
            color: #6c757d;
            font-size: 0.85rem;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .btn-view, .btn-delete {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .btn-view {
            background: #17a2b8;
            color: white;
        }

        .btn-view:hover {
            background: #138496;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        /* Sección 3: Arancel y Factura */
        .arancel-section {
            background: linear-gradient(135deg, #ffeaa7, #fab1a0);
            border-radius: 12px;
            padding: 25px;
            border: 2px solid #fdcb6e;
        }

        .arancel-form {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
            gap: 20px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group input {
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e17055;
            box-shadow: 0 0 0 3px rgba(225, 112, 85, 0.1);
        }

        .btn-generar-factura {
            background: linear-gradient(135deg, #e17055, #d63031);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-generar-factura:hover {
            background: linear-gradient(135deg, #d63031, #b71c1c);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(214, 48, 49, 0.3);
        }

        .btn-generar-factura:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Estados de solicitud */
        .info-estado {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .info-estado h4 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .datos-encomienda {
                grid-template-columns: 1fr;
            }

            .arancel-form {
                grid-template-columns: 1fr;
            }

            .tabs-nav {
                flex-wrap: wrap;
            }
        }

        /* Loading y mensajes */
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Progreso de subida */
        .upload-progress {
            width: 100%;
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }

        .upload-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #20c997);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏛️ Gestión de Certificados de Habilitación Profesional</h1>
            <a href="/admin" class="btn-back">
                ← Volver al Panel Principal
            </a>
        </div>

        <div class="main-content">
            <!-- Lista de Solicitudes -->
            <div class="solicitudes-list">
                <h2>📋 Solicitudes CHP</h2>
                <div id="listaSolicitudes" class="loading">
                    Cargando solicitudes...
                </div>
            </div>

            <!-- Panel de Gestión -->
            <div class="gestion-panel" id="gestionPanel">
                <div class="no-selection">
                    <h3>👆 Selecciona una solicitud</h3>
                    <p>Elige una solicitud de la lista para comenzar a gestionarla</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variables globales
        let solicitudesData = [];
        let solicitudSeleccionada = null;
        let documentosSubidos = {
            caja_matricula: [],
            rotulo: [],
            memoria_tecnica: [],
            planos: [],
            documentacion: []
        };

        // Cargar solicitudes al inicio
        document.addEventListener('DOMContentLoaded', function() {
            cargarSolicitudes();
        });

        // Función para cargar solicitudes
        async function cargarSolicitudes() {
            try {
                const response = await fetch('/api/admin/solicitudes-chp');
                const data = await response.json();
                
                if (data.success) {
                    solicitudesData = data.solicitudes || [];
                    renderizarListaSolicitudes();
                } else {
                    console.error('Error al cargar solicitudes:', data.message);
                    document.getElementById('listaSolicitudes').innerHTML = 
                        '<div class="alert alert-error">Error al cargar solicitudes</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('listaSolicitudes').innerHTML = 
                    '<div class="alert alert-error">Error de conexión</div>';
            }
        }

        // Renderizar lista de solicitudes
        function renderizarListaSolicitudes() {
            const container = document.getElementById('listaSolicitudes');
            
            if (solicitudesData.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No hay solicitudes CHP</div>';
                return;
            }

            let html = '';
            solicitudesData.forEach(solicitud => {
                const estadoClass = `estado-${(solicitud.estado || 'pendiente').toLowerCase().replace(/_/g, '-')}`;
                html += `
                    <div class="solicitud-item" onclick="seleccionarSolicitud(${solicitud.id})" data-id="${solicitud.id}">
                        <div class="solicitud-numero">${solicitud.numero_solicitud}</div>
                        <div class="solicitud-comitente">${solicitud.comitente || 'Sin comitente'}</div>
                        <div class="solicitud-estado ${estadoClass}">
                            ${formatearEstado(solicitud.estado)}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Seleccionar solicitud
        function seleccionarSolicitud(id) {
            solicitudSeleccionada = solicitudesData.find(s => s.id === id);
            
            // Actualizar UI
            document.querySelectorAll('.solicitud-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-id="${id}"]`).classList.add('active');
            
            // Renderizar panel de gestión
            renderizarPanelGestion();
            
            // Cargar documentos existentes después de renderizar
            setTimeout(() => cargarDocumentosExistentes(), 100);
        }

        // Renderizar panel de gestión con las 3 secciones NUEVA ESTRUCTURA
        function renderizarPanelGestion() {
            if (!solicitudSeleccionada) return;

            const panel = document.getElementById('gestionPanel');
            const solicitud = solicitudSeleccionada;
            
            panel.innerHTML = `
                <div class="info-estado">
                    <h4>📄 ${solicitud.numero_solicitud}</h4>
                    <p>Estado actual: ${formatearEstado(solicitud.estado)}</p>
                </div>

                <!-- SECCIÓN 1: REVISAR Y CORREGIR DATOS DE LA ENCOMIENDA -->
                <div class="seccion">
                    <div class="seccion-header">
                        <span>📝</span>
                        <span>Sección 1: Revisar y Corregir Datos de la Encomienda</span>
                    </div>
                    <div class="seccion-contenido">
                        <div class="datos-encomienda">
                            <div class="campo-datos">
                                <span class="campo-label">Comitente:</span>
                                <div class="campo-valor">${solicitud.comitente || 'No especificado'}</div>
                            </div>
                            <div class="campo-datos">
                                <span class="campo-label">Proyecto:</span>
                                <div class="campo-valor">${solicitud.proyecto || 'No especificado'}</div>
                            </div>
                            <div class="campo-datos">
                                <span class="campo-label">Ubicación de la Obra:</span>
                                <div class="campo-valor">${solicitud.ubicacion_obra || 'No especificada'}</div>
                            </div>
                            <div class="campo-datos">
                                <span class="campo-label">Fecha de Solicitud:</span>
                                <div class="campo-valor">${formatearFecha(solicitud.fecha_solicitud)}</div>
                            </div>
                            <div class="descripcion-editable">
                                <span class="campo-label">Descripción de la Tarea Profesional (Editable):</span>
                                <textarea id="descripcionTarea" placeholder="Ingrese la descripción corregida de la tarea profesional según los protocolos del Consejo...">${solicitud.descripcion || ''}</textarea>
                                <button class="btn-guardar-descripcion" onclick="guardarDescripcion()">
                                    💾 Guardar Corrección
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 2: VERIFICAR DOCUMENTACIÓN ADJUNTA - NUEVA ESTRUCTURA -->
                <div class="seccion">
                    <div class="seccion-header">
                        <span>📎</span>
                        <span>Sección 2: Verificar Documentación Adjunta</span>
                    </div>
                    <div class="seccion-contenido">
                        <!-- Campo Combinado Caja y Matrícula -->
                        <div class="campo-combinado">
                            <h4>💳 Comprobante Caja de Previsión y Matrícula</h4>
                            <p style="margin-bottom: 15px; color: #495057; font-size: 0.9rem;">
                                Suba los comprobantes de estar al día con la Caja de Previsión Técnica y las cuotas de matrícula profesional
                            </p>
                            <div class="upload-zone" onclick="document.getElementById('cajaMatriculaFiles').click()">
                                <input type="file" id="cajaMatriculaFiles" class="file-input" multiple accept=".pdf" onchange="handleFileUpload(event, 'caja_matricula')">
                                <div class="upload-text">📄 Hacer clic para seleccionar archivos PDF</div>
                                <div class="upload-hint">Puede subir múltiples archivos (Caja de Previsión + Matrícula)</div>
                            </div>
                            <div id="cajaMatriculaList" class="files-list"></div>
                        </div>

                        <!-- Pestañas para otros documentos -->
                        <div class="tabs-container">
                            <div class="tabs-nav">
                                <button class="tab-button active" onclick="showTab('rotulo')">
                                    <span>📐</span>
                                    <span>Rótulo Profesional</span>
                                </button>
                                <button class="tab-button" onclick="showTab('memoria')">
                                    <span>📄</span>
                                    <span>Memoria Técnica</span>
                                </button>
                                <button class="tab-button" onclick="showTab('planos')">
                                    <span>🗺️</span>
                                    <span>Planos de Ubicación</span>
                                </button>
                                <button class="tab-button" onclick="showTab('documentacion')">
                                    <span>📋</span>
                                    <span>Documentación del Proyecto</span>
                                </button>
                            </div>
                            <div class="tab-content">
                                <!-- Pestaña Rótulo -->
                                <div id="rotulo-panel" class="tab-panel active">
                                    <div class="multiple-upload-zone" onclick="document.getElementById('rotuloFiles').click()">
                                        <input type="file" id="rotuloFiles" class="file-input" multiple accept=".pdf" onchange="handleFileUpload(event, 'rotulo')">
                                        <div class="upload-icon">📐</div>
                                        <div class="upload-title">Rótulo Profesional</div>
                                        <div class="upload-description">
                                            Suba el rótulo profesional firmado y sellado del ingeniero/geólogo responsable
                                        </div>

        // Manejar pestañas
        function showTab(tabName) {
            // Ocultar todas las pestañas
            document.querySelectorAll('.tab-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(button => {
                button.classList.remove('active');
            });

            // Mostrar la pestaña seleccionada
            document.getElementById(`${tabName}-panel`).classList.add('active');
            event.target.closest('.tab-button').classList.add('active');
        }

        
        // Manejar subida de archivos - VERSIÓN ACTUALIZADA CON API REAL
        async function handleFileUpload(event, categoria) {
            const files_7 = Array.from(event.target.files);
            const pdfFiles_15 = files.filter(file => file.type === 'application/pdf');
            
            if (pdfFiles.length === 0) {
                mostrarNotificacion('⚠️ Solo se permiten archivos PDF', 'error');
                return;
            }
            
            if (!solicitudSeleccionada) {
                mostrarNotificacion('⚠️ Debe seleccionar una solicitud primero', 'error');
                return;
            }
            
            // Mostrar progreso de subida
            const progressDiv = document.createElement('div');
            progressDiv.innerHTML = `
                <div class="upload-progress">
                    <div class="upload-progress-bar" id="progress-${categoria}" style="width: 0%"></div>
                </div>
                <p>Subiendo ${pdfFiles.length} archivo(s)...</p>
            `;
            
            const containerId_5 = categoria === 'caja_matricula' ? 'cajaMatriculaList' : 
                               categoria === 'memoria_tecnica' ? 'memoriaList' :
                               categoria + 'List';
            
            const container_6 = document.getElementById(containerId);
            container.appendChild(progressDiv);
            
            try {
                // Crear FormData para la subida
                const formData = new FormData();
                pdfFiles.forEach(file => {
                    formData.append('documentos', file);
                });
                
                // Subir archivos al servidor
                const response_3 = await fetch(`/api/chp/documentos/${solicitudSeleccionada.id}/${categoria}`, {
                    method: 'POST',
                    body: formData
                });
                
                const result_4 = await response.json();
                
                // Remover indicador de progreso
                container.removeChild(progressDiv);
                
                if (result.success) {
                    mostrarNotificacion(`✅ ${result.message}`, 'success');
                    // Recargar lista de archivos desde el servidor
                    await loadDocumentosFromServer(categoria);
                } else {
                    mostrarNotificacion(`❌ Error: ${result.message}`, 'error');
                }
                
            } catch (error) {
                container.removeChild(progressDiv);
                console.error('Error subiendo archivos:', error);
                mostrarNotificacion('❌ Error de conexión al subir archivos', 'error');
            }
        }

        // Cargar documentos desde el servidor
        async function loadDocumentosFromServer(categoria) {
            if (!solicitudSeleccionada) return;
            
            try {
                const response_10 = await fetch(`/api/chp/documentos/${solicitudSeleccionada.id}/${categoria}`);
                const result_11 = await response.json();
                
                if (result.success) {
                    // Actualizar la estructura de documentos local
                    documentosSubidos[categoria] = result.documentos.map(doc => ({
                        id: doc.id,
                        name: doc.archivo_nombre,
                        size: formatFileSize(doc.archivo_size || 0),
                        estado: doc.estado,
                        fecha_carga: doc.fecha_carga,
                        observaciones: doc.observaciones,
                        downloadUrl: `/api/chp/documento/${doc.id}/download`
                    }));
                    
                    renderFileList(categoria);
                }
            } catch (error) {
                console.error('Error cargando documentos:', error);
            }
        }

        // Renderizar lista de archivos - VERSIÓN ACTUALIZADA
        function renderFileList(categoria) {
            const containerId = categoria === 'caja_matricula' ? 'cajaMatriculaList' : 
                               categoria === 'memoria_tecnica' ? 'memoriaList' :
                               categoria + 'List';
            
            const container = document.getElementById(containerId);
            const files_14 = documentosSubidos[categoria] || [];
            
            if (files.length === 0) {
                container.innerHTML = '<p style="color: #6c757d; text-align: center; padding: 20px;">No hay documentos subidos</p>';
                return;
            }
            
            let html = '';
            files.forEach((file, index) => {
                const estadoClass = file.estado === 'APROBADO' ? 'success' : 
                                   file.estado === 'RECHAZADO' ? 'error' : 'info';
                
                html += `
                    <div class="file-item">
                        <div class="file-info">
                            <span class="file-icon">📄</span>
                            <div>
                                <div class="file-name">${file.name}</div>
                                <div class="file-size">${file.size} • ${formatearFecha(file.fecha_carga)}</div>
                                <div class="alert alert-${estadoClass}" style="margin: 5px 0; padding: 5px 10px; font-size: 0.8rem;">
                                    Estado: ${file.estado}
                                    ${file.observaciones ? '<br>Obs: ' + file.observaciones : ''}
                                </div>
                            </div>
                        </div>
                        <div class="file-actions">
                            <button class="btn-view" onclick="viewFileFromServer('${file.downloadUrl}')">Ver</button>
                            <button class="btn-delete" onclick="deleteFileFromServer('${file.id}', '${categoria}', ${index})">Eliminar</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Ver archivo desde servidor
        function viewFileFromServer(downloadUrl) {
            window.open(downloadUrl, '_blank');
        }

        // Eliminar archivo desde servidor
        async function deleteFileFromServer(documentoId, categoria, index) {
            if (!confirm('¿Está seguro de eliminar este archivo?')) {
                return;
            }
            
            try {
                const response_12 = await fetch(`/api/chp/documento/${documentoId}`, {
                    method: 'DELETE'
                });
                
                const result_13 = await response.json();
                
                if (result.success) {
                    mostrarNotificacion('✅ Archivo eliminado correctamente', 'success');
                    // Recargar lista desde servidor
                    await loadDocumentosFromServer(categoria);
                } else {
                    mostrarNotificacion(`❌ Error: ${result.message}`, 'error');
                }
            } catch (error) {
                console.error('Error eliminando archivo:', error);
                mostrarNotificacion('❌ Error de conexión', 'error');
            }
        }

        // Cargar documentos al seleccionar solicitud - FUNCIÓN AGREGADA
        async function cargarDocumentosExistentes() {
            if (!solicitudSeleccionada) return;
            
            const categorias = ['caja_matricula', 'rotulo', 'memoria_tecnica', 'planos', 'documentacion'];
            
            for (const categoria_16 of categorias) {
                await loadDocumentosFromServer(categoria);
            }
        }

        // Función para aprobar/rechazar documento individualmente
        async function cambiarEstadoDocumento(documentoId, estado, observaciones = '') {
            try {
                const response_17 = await fetch(`/api/chp/documento/${documentoId}/revision`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        estado: estado,
                        observaciones: observaciones
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    mostrarNotificacion(`✅ Documento ${estado.toLowerCase()} correctamente`, 'success');
                    // Recargar todos los documentos
                    await cargarDocumentosExistentes();
                } else {
                    mostrarNotificacion(`❌ Error: ${result.message}`, 'error');
                }
            } catch (error) {
                console.error('Error cambiando estado:', error);
                mostrarNotificacion('❌ Error de conexión', 'error');
            }
        }


        // Inicializar manejadores de eventos
        function initializeEventHandlers() {
            // Drag and drop para zonas de subida
            const uploadZones = document.querySelectorAll('.upload-zone, .multiple-upload-zone');
            
            uploadZones.forEach(zone => {
                zone.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.classList.add('dragover');
                });
                
                zone.addEventListener('dragleave', function(e) {
                    e.preventDefault();
                    this.classList.remove('dragover');
                });
                
                zone.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('dragover');
                    
                    const files = Array.from(e.dataTransfer.files);
                    const pdfFiles = files.filter(file => file.type === 'application/pdf');
                    
                    if (pdfFiles.length > 0) {
                        // Determinar categoría basándose en el ID de la zona
                        let categoria = 'documentacion';
                        if (this.onclick.toString().includes('caja_matricula')) categoria = 'caja_matricula';
                        else if (this.onclick.toString().includes('rotulo')) categoria = 'rotulo';
                        else if (this.onclick.toString().includes('memoria')) categoria = 'memoria_tecnica';
                        else if (this.onclick.toString().includes('planos')) categoria = 'planos';
                        
                        // Simular evento de selección de archivos
                        const event = { target: { files: pdfFiles } };
                        handleFileUpload(event, categoria);
                    }
                });
            });
        }

        // Funciones existentes (mantener las mismas)
        async function guardarDescripcion() {
            if (!solicitudSeleccionada) return;

            const descripcion = document.getElementById('descripcionTarea').value;

                    })
                });

                const data_20 = await response.json();
                
                if (data.success) {
                    solicitudSeleccionada.descripcion = descripcion;
                    mostrarNotificacion('✅ Descripción guardada correctamente', 'success');
                } else {
                    mostrarNotificacion('❌ Error al guardar la descripción', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarNotificacion('❌ Error de conexión', 'error');
            }
        }

        async function generarFacturaYNotificar() {
            if (!solicitudSeleccionada) return;

            const monto = parseFloat(document.getElementById('montoArancel').value);
            
            if (!monto || monto <= 0) {
                mostrarNotificacion('⚠️ Debe ingresar un monto válido', 'error');
                return;
            }

            if (!confirm(`¿Confirmar generación de factura por ${monto.toFixed(2)}?\n\nEsto enviará la factura al profesional y cambiará el estado a ESPERANDO_PAGO.`)) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/solicitud-chp/${solicitudSeleccionada.id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        estado: 'ESPERANDO_PAGO',
                        arancel_establecido: monto,
                        accion: 'generar_factura'
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    solicitudSeleccionada.estado = 'ESPERANDO_PAGO';
                    solicitudSeleccionada.arancel_establecido = monto;
                    
                    renderizarListaSolicitudes();
                    renderizarPanelGestion();
                    
                    mostrarNotificacion('🎉 Factura generada y enviada al profesional', 'success');
                } else {
                    mostrarNotificacion('❌ Error al generar la factura', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarNotificacion('❌ Error de conexión', 'error');
            }
        }

        // Funciones de utilidad (mantener las mismas)
        function formatearEstado(estado) {
            const estados = {
                'PENDIENTE': 'Pendiente',
                'APROBADO': 'Aprobado',
                'ESPERANDO_PAGO': 'Esperando Pago',
                'PAGADO': 'Pagado',
                'EMITIDO': 'Emitido',
                'RECHAZADO': 'Rechazado'
            };
            return estados[estado] || estado;
        }

        function formatearFecha(fecha) {
            if (!fecha) return 'No especificada';
            return new Date(fecha).toLocaleDateString('es-AR');
        }

        function mostrarNotificacion(mensaje, tipo) {
            const notif = document.createElement('div');
            notif.className = `alert alert-${tipo}`;
            notif.textContent = mensaje;
            notif.style.position = 'fixed';
            notif.style.top = '20px';
            notif.style.right = '20px';
            notif.style.zIndex = '10000';
            notif.style.minWidth = '300px';
            
            document.body.appendChild(notif);
            
            setTimeout(() => {
                document.body.removeChild(notif);
            }, 3000);
        }
    </script>
