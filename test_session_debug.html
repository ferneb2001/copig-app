<!DOCTYPE html>
<html>
<head>
    <title>Debug de Sesión CHP</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        .resultado { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #fee; color: #900; }
        .success { background: #efe; color: #090; }
        button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>
    <h1>🔧 Debug de Sesión - CHP Modificación</h1>
    
    <button onclick="testLogin()">1. 🔐 Test Login</button>
    <button onclick="testSession()">2. 📋 Test Session Info</button>
    <button onclick="testSolicitudes()">3. 📄 Test Solicitudes</button>
    <button onclick="testModificar()">4. ✏️ Test Modificar</button>
    <button onclick="clearLog()">🧹 Clear Log</button>
    
    <div id="log"></div>

    <script>
        function log(message, isError = false, isSuccess = false) {
            const div = document.createElement('div');
            div.className = 'resultado';
            if (isError) div.className += ' error';
            if (isSuccess) div.className += ' success';
            
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            document.getElementById('log').appendChild(div);
            div.scrollIntoView();
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function testLogin() {
            log('🔐 Iniciando test de login...');
            
            try {
                const response = await fetch('/api/unified-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dni: '99999999', password: 'prueba123' }),
                    credentials: 'include' // IMPORTANTE: incluir cookies
                });
                
                const result = await response.json();
                
                if (result.success) {
                    log(`✅ Login exitoso - Usuario: ${result.user?.username} (${result.user?.role})`, false, true);
                    log(`📋 Respuesta completa: ${JSON.stringify(result, null, 2)}`);
                } else {
                    log(`❌ Login fallido: ${result.message || result.error}`, true);
                }
                
            } catch (error) {
                log(`💥 Error en login: ${error.message}`, true);
            }
        }

        async function testSession() {
            log('📋 Verificando información de sesión...');
            
            try {
                const response = await fetch('/api/session-info', {
                    credentials: 'include' // IMPORTANTE: incluir cookies
                });
                
                const result = await response.json();
                log(`📊 Sesión actual: ${JSON.stringify(result, null, 2)}`);
                
                if (result.profesionalId) {
                    log(`✅ ProfesionalId en sesión: ${result.profesionalId}`, false, true);
                } else {
                    log(`⚠️ No hay profesionalId en sesión`, true);
                }
                
            } catch (error) {
                log(`💥 Error obteniendo sesión: ${error.message}`, true);
            }
        }

        async function testSolicitudes() {
            log('📄 Probando endpoint de solicitudes...');
            
            try {
                const response = await fetch('/api/profesional/solicitudes-chp', {
                    credentials: 'include' // IMPORTANTE: incluir cookies
                });
                
                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        log(`✅ Solicitudes obtenidas: ${result.solicitudes?.length || 0} encontradas`, false, true);
                        if (result.solicitudes && result.solicitudes.length > 0) {
                            result.solicitudes.forEach((sol, i) => {
                                log(`   ${i+1}. ${sol.numero_solicitud} - ${sol.estado} - ${sol.comitente}`);
                            });
                        }
                    } else {
                        log(`❌ Error en solicitudes: ${result.message}`, true);
                    }
                } else {
                    const errorText = await response.text();
                    log(`❌ Error HTTP ${response.status}: ${errorText}`, true);
                }
                
            } catch (error) {
                log(`💥 Error obteniendo solicitudes: ${error.message}`, true);
            }
        }

        async function testModificar() {
            log('✏️ Probando modificación de solicitud...');
            
            // Primero obtener una solicitud PENDIENTE
            try {
                const solicitudesResponse = await fetch('/api/profesional/solicitudes-chp', {
                    credentials: 'include'
                });
                
                if (!solicitudesResponse.ok) {
                    log('❌ No se pudieron obtener solicitudes para modificar', true);
                    return;
                }
                
                const solicitudesResult = await solicitudesResponse.json();
                
                if (!solicitudesResult.success || !solicitudesResult.solicitudes?.length) {
                    log('⚠️ No hay solicitudes disponibles para modificar');
                    return;
                }
                
                const solicitudPendiente = solicitudesResult.solicitudes.find(s => s.estado === 'PENDIENTE');
                
                if (!solicitudPendiente) {
                    log('⚠️ No hay solicitudes PENDIENTES para modificar');
                    return;
                }
                
                log(`📝 Modificando solicitud: ${solicitudPendiente.numero_solicitud}`);
                
                const datosModificados = {
                    comitente: 'CLIENTE DEBUG NAVEGADOR ' + new Date().getTime(),
                    proyecto: 'PROYECTO DEBUG',
                    descripcion: 'Descripción modificada desde navegador',
                    ubicacion_obra: 'Debug Location',
                    monto_obra_estimado: 99999
                };
                
                const response = await fetch(`/api/profesional/solicitud-chp/${solicitudPendiente.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosModificados),
                    credentials: 'include' // IMPORTANTE: incluir cookies
                });
                
                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        log(`✅ Modificación exitosa: ${result.message}`, false, true);
                        log(`🎉 Solicitud ${solicitudPendiente.numero_solicitud} modificada correctamente`);
                    } else {
                        log(`❌ Error en modificación: ${result.message}`, true);
                    }
                } else {
                    const errorText = await response.text();
                    log(`❌ Error HTTP ${response.status}: ${errorText}`, true);
                }
                
            } catch (error) {
                log(`💥 Error en modificación: ${error.message}`, true);
            }
        }

        // Auto-ejecutar test de sesión al cargar
        window.addEventListener('load', () => {
            log('🚀 Página de debug cargada. Haga clic en los botones para probar.');
        });
    </script>
</body>
</html>
