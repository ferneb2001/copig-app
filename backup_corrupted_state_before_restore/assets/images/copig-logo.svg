<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <!-- Logo del COPIG - Consejo Profesional de Ingenieros y Geólogos de Mendoza -->
  
  <!-- Símbolo geométrico del logo -->
  <g transform="translate(300, 150)">
    <!-- Cuadrado base negro -->
    <rect x="-80" y="-80" width="160" height="160" fill="#1a1a1a"/>
    
    <!-- Triángulo rojo característico -->
    <path d="M40,-80 L80,-80 L80,80 L40,40 Z" fill="#dc3545"/>
    
    <!-- Línea curva blanca característica -->
    <path d="M-60,60 Q20,80 80,60" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Texto del logo -->
  <text x="300" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">
    CONSEJO PROFESIONAL DE
  </text>
  <text x="300" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1a1a1a">
    INGENIEROS Y GEÓLOGOS
  </text>
  <text x="300" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#666666">
    DE MENDOZA
  </text>
</svg>