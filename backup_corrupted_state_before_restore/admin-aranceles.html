<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Aranceles CHP - Admin COPIG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        .back-button {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .main-content {
            padding: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 20px 30px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .card-body {
            padding: 30px;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e8ecf0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e8ecf0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #3498db;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-activo {
            background: #d4edda;
            color: #155724;
        }

        .status-inactivo {
            background: #f8d7da;
            color: #721c24;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .alert {
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Gestión de Aranceles CHP</h1>
            <a href="/admin" class="back-button">← Volver al Admin</a>
        </div>

        <div class="main-content">
            <div class="card">
                <div class="card-header">
                    💰 Configuración de Aranceles y Porcentajes
                </div>
                <div class="card-body">
                    <div id="alertContainer"></div>
                    
                    <div class="table-responsive">
                        <table id="arancelesTable">
                            <thead>
                                <tr>
                                    <th>Segmento</th>
                                    <th>Nombre</th>
                                    <th>Rango de Honorarios</th>
                                    <th>Arancel ($)</th>
                                    <th>Porcentaje (%)</th>
                                    <th>Vigencia</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="arancelesTableBody">
                                <tr>
                                    <td colspan="8" style="text-align: center; padding: 40px;">
                                        <div class="spinner" style="margin: 0 auto 20px;"></div>
                                        Cargando aranceles...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para editar arancel -->
    <div id="editModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 15px; padding: 30px; width: 90%; max-width: 600px; max-height: 90%; overflow-y: auto;">
            <h3 style="margin-bottom: 20px;">✏️ Editar Arancel</h3>
            
            <form id="editForm">
                <input type="hidden" id="editId">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editSegmento">Segmento</label>
                        <input type="text" id="editSegmento" required maxlength="5">
                    </div>
                    <div class="form-group">
                        <label for="editNombre">Nombre del Segmento</label>
                        <input type="text" id="editNombre" required maxlength="100">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="editMontoDesde">Monto Desde ($)</label>
                        <input type="number" id="editMontoDesde" required min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="editMontoHasta">Monto Hasta ($)</label>
                        <input type="number" id="editMontoHasta" min="0" step="0.01" placeholder="Dejar vacío para sin límite">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="editArancel">Arancel ($)</label>
                        <input type="number" id="editArancel" required min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="editPorcentaje">Porcentaje (%)</label>
                        <input type="number" id="editPorcentaje" min="0" max="100" step="0.01" placeholder="Ej: 3.65">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="editFechaDesde">Vigencia Desde</label>
                        <input type="date" id="editFechaDesde" required>
                    </div>
                    <div class="form-group">
                        <label for="editFechaHasta">Vigencia Hasta</label>
                        <input type="date" id="editFechaHasta" placeholder="Dejar vacío para sin vencimiento">
                    </div>
                </div>

                <div class="form-group">
                    <label for="editActivo">Estado</label>
                    <select id="editActivo" required>
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="editObservaciones">Observaciones</label>
                    <input type="text" id="editObservaciones" placeholder="Observaciones adicionales">
                </div>

                <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 30px;">
                    <button type="button" onclick="closeEditModal()" class="btn" style="background: #6c757d; color: white;">Cancelar</button>
                    <button type="submit" class="btn btn-success">💾 Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let aranceles = [];

        // Cargar aranceles al inicializar
        document.addEventListener('DOMContentLoaded', function() {
            cargarAranceles();
        });

        async function cargarAranceles() {
            try {
                const response = await fetch('/api/admin/aranceles-chp');
                const result = await response.json();
                
                if (result.success) {
                    aranceles = result.aranceles;
                    renderAranceles();
                } else {
                    showAlert('Error al cargar aranceles: ' + result.message, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error de conexión al cargar aranceles', 'error');
            }
        }

        function renderAranceles() {
            const tbody = document.getElementById('arancelesTableBody');
            
            if (aranceles.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;">No hay aranceles configurados</td></tr>';
                return;
            }

            tbody.innerHTML = aranceles.map(arancel => {
                const montoHasta = arancel.monto_hasta ? `$${parseFloat(arancel.monto_hasta).toLocaleString('es-AR')}` : 'Sin límite';
                const rango = `$${parseFloat(arancel.monto_desde).toLocaleString('es-AR')} - ${montoHasta}`;
                const fechaHasta = arancel.fecha_vigencia_hasta 
                    ? new Date(arancel.fecha_vigencia_hasta).toLocaleDateString('es-ES')
                    : 'Sin vencimiento';
                const vigencia = `${new Date(arancel.fecha_vigencia_desde).toLocaleDateString('es-ES')} - ${fechaHasta}`;
                const porcentaje = arancel.porcentaje_fijo ? `${arancel.porcentaje_fijo}%` : 'No configurado';
                
                return `
                    <tr>
                        <td><strong>${arancel.segmento}</strong></td>
                        <td>${arancel.nombre_segmento}</td>
                        <td>${rango}</td>
                        <td>$${parseFloat(arancel.arancel).toLocaleString('es-AR')}</td>
                        <td><strong style="color: #e67e22;">${porcentaje}</strong></td>
                        <td>${vigencia}</td>
                        <td>
                            <span class="status-badge status-${arancel.activo ? 'activo' : 'inactivo'}">
                                ${arancel.activo ? 'Activo' : 'Inactivo'}
                            </span>
                        </td>
                        <td>
                            <button onclick="editarArancel(${arancel.id})" class="btn btn-primary" style="padding: 6px 12px; font-size: 12px;">
                                ✏️ Editar
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function editarArancel(id) {
            const arancel = aranceles.find(a => a.id === id);
            if (!arancel) return;

            document.getElementById('editId').value = arancel.id;
            document.getElementById('editSegmento').value = arancel.segmento;
            document.getElementById('editNombre').value = arancel.nombre_segmento;
            document.getElementById('editMontoDesde').value = arancel.monto_desde;
            document.getElementById('editMontoHasta').value = arancel.monto_hasta || '';
            document.getElementById('editArancel').value = arancel.arancel;
            document.getElementById('editPorcentaje').value = arancel.porcentaje_fijo || '';
            document.getElementById('editFechaDesde').value = arancel.fecha_vigencia_desde ? arancel.fecha_vigencia_desde.split('T')[0] : '';
            document.getElementById('editFechaHasta').value = arancel.fecha_vigencia_hasta ? arancel.fecha_vigencia_hasta.split('T')[0] : '';
            document.getElementById('editActivo').value = arancel.activo.toString();
            document.getElementById('editObservaciones').value = arancel.observaciones || '';

            document.getElementById('editModal').style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // Manejar envío del formulario de edición
        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const id = formData.get('editId') || document.getElementById('editId').value;
            
            const data = {
                segmento: document.getElementById('editSegmento').value,
                nombre_segmento: document.getElementById('editNombre').value,
                monto_desde: parseFloat(document.getElementById('editMontoDesde').value),
                monto_hasta: document.getElementById('editMontoHasta').value ? parseFloat(document.getElementById('editMontoHasta').value) : null,
                arancel: parseFloat(document.getElementById('editArancel').value),
                porcentaje_fijo: document.getElementById('editPorcentaje').value ? parseFloat(document.getElementById('editPorcentaje').value) : null,
                usar_porcentaje_fijo: document.getElementById('editPorcentaje').value ? true : false,
                fecha_vigencia_desde: document.getElementById('editFechaDesde').value,
                fecha_vigencia_hasta: document.getElementById('editFechaHasta').value || null,
                activo: document.getElementById('editActivo').value === 'true',
                observaciones: document.getElementById('editObservaciones').value
            };

            try {
                const response = await fetch(`/api/admin/arancel-chp/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('✅ Arancel actualizado correctamente', 'success');
                    closeEditModal();
                    cargarAranceles();
                } else {
                    showAlert('❌ Error al actualizar: ' + result.message, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('❌ Error de conexión al actualizar', 'error');
            }
        });

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
            
            container.innerHTML = `
                <div class="alert ${alertClass}">
                    ${message}
                </div>
            `;
            
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // Cerrar modal al hacer clic fuera
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });
    </script>
</body>
</html>
